<title>Ocean Rush 🐠</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#060d1a;font-family:'Fredoka One','Nunito','Segoe UI','Noto Sans','Helvetica Neue',Arial,'Noto Sans CJK SC','Noto Sans CJK JP','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;overscroll-behavior:none}
#app{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh}
.card{background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #00f5ff44;border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;width:320px;box-shadow:0 0 40px #00f5ff22}
.logo{font-size:32px;font-weight:800;color:#fff;letter-spacing:1px;text-shadow:0 0 20px #00f5ff,0 0 40px #ff6bb5}
.logo2{font-size:26px;font-weight:800;color:#ffd700;text-shadow:0 0 15px #ffd700}
.sub{color:#7ad4f0;font-size:13px}
input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #00f5ff55;background:#0a1a30;color:#fff;font-size:16px;outline:none;font-family:inherit}
.btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px #00b4d844}
.btn-purple{background:linear-gradient(135deg,#7b2d8b,#4a0d6e);box-shadow:0 4px 20px #7b2d8b44}
.btn-orange{background:linear-gradient(135deg,#ff6b35,#b44fff);box-shadow:0 4px 20px #ff6b3544}
.btn-ghost{background:transparent;border:1.5px solid #ffffff33;box-shadow:none;color:#aaa}
.btn-red{background:linear-gradient(135deg,#c0392b,#96281b);box-shadow:0 4px 20px #c0392b44}
.panel{width:340px;max-height:90vh;background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #ffd70033;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px #ffd70022}
.panel-header{padding:20px 20px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;border-bottom:1px solid #ffffff11}
.plist{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:12px}
.pcard{display:flex;align-items:center;gap:10px;background:#ffffff08;border:1px solid #ffffff12;border-radius:14px;padding:13px}
.picon{font-size:30px;flex-shrink:0;width:38px;text-align:center}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pname{font-size:15px;font-weight:800;color:#fff;line-height:1;margin-bottom:3px}
.pdesc{font-size:12px;color:#9bbdd4;line-height:1.4}
.pdur{font-size:11px;color:#556;margin-top:3px}
.blist{flex:1;overflow-y:auto;padding:8px 12px}
.brow{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;margin-bottom:4px;color:#cde;font-size:14px}
.brow-me{background:#00f5ff18;border:1.5px solid #00f5ff44}
.brow-top{background:#ffd70011}
.rnum{width:36px;font-weight:800;font-size:16px;flex-shrink:0}
.rnick{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rscore{font-weight:800;color:#ffd700;font-size:16px;flex-shrink:0}
.rdate{color:#556;font-size:11px;flex-shrink:0;width:50px;text-align:right}
.rflag{font-size:14px;flex-shrink:0}
.game-wrap{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 60px #00f5ff44}
canvas{display:block}
.hud{position:absolute;top:16px;left:0;right:0;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.score-hud{font-size:42px;font-weight:800;color:#fff;text-shadow:0 0 15px #00f5ff,2px 2px 0 #0003;line-height:1}
.combo-hud{font-size:16px;font-weight:700;color:#ffd700;text-shadow:0 0 10px #ffd700;margin-top:2px}
.pu-ind{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);border:2px solid;border-radius:20px;padding:6px 18px;color:#fff;font-size:13px;font-weight:700;letter-spacing:1px;backdrop-filter:blur(4px);min-width:160px;text-align:center}
.pu-bar-bg{width:100%;height:4px;background:#ffffff22;border-radius:2px;margin-top:4px;overflow:hidden}
.pu-bar{height:100%;border-radius:2px;transition:width 0.1s linear}
.pu-flash{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:800;color:#ffd700;text-shadow:0 0 20px #ffd700;pointer-events:none;white-space:nowrap}
.overlay{position:absolute;inset:0;background:#00000066;display:flex;align-items:center;justify-content:center}
.overlay-card{background:#0d2040ee;border:1.5px solid #00f5ff44;border-radius:16px;padding:24px 32px;text-align:center;display:flex;flex-direction:column;gap:6px}
.bottom-bar{margin-top:10px;display:flex;align-items:center;gap:10px}
.mini-btn{padding:7px 14px;border-radius:10px;border:1.5px solid #ffd70066;background:transparent;color:#ffd700;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.pause-btn{padding:7px 14px;border-radius:10px;border:1.5px solid #ffffff33;background:transparent;color:#fff;font-size:16px;cursor:pointer;font-family:inherit;line-height:1}
.rank-badge{background:#ffd70022;border:1.5px solid #ffd70055;border-radius:10px;padding:8px 16px;color:#ffd700;font-size:14px;font-weight:700}
.loading{color:#7ad4f0;text-align:center;padding:20px;font-size:14px}
.empty{color:#556;text-align:center;padding:30px;font-size:14px}
.pause-overlay{position:absolute;inset:0;background:rgba(4,12,30,0.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
.pause-card{background:linear-gradient(145deg,#0d2448,#091830);border:2px solid #00f5ff55;border-radius:24px;padding:36px 44px;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 0 60px #00f5ff22}
.pause-title{font-size:36px;font-weight:800;color:#fff;letter-spacing:2px;text-shadow:0 0 20px #00f5ff}
.pause-score{font-size:18px;color:#aef0ff}
.countdown-circle{position:relative;width:100px;height:100px}
.countdown-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;text-shadow:0 0 20px #00f5ff}
/* Settings */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #ffffff0a}
.settings-label{color:#cde;font-size:15px;font-weight:700}
.settings-sub{color:#556;font-size:11px;margin-top:2px}
.toggle{width:48px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle.on{background:linear-gradient(135deg,#00b4d8,#0077b6)}
.toggle.off{background:#334}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.2s;box-shadow:0 1px 4px #0006}
.toggle.on::after{transform:translateX(22px)}
/* Language picker overlay */
.lang-overlay{position:fixed;inset:0;background:rgba(4,12,30,0.92);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:999}
.lang-card{background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #00f5ff44;border-radius:20px;padding:24px;width:320px;max-height:85vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 0 60px #00f5ff22}
.lang-title{font-size:22px;font-weight:800;color:#fff;text-align:center;text-shadow:0 0 15px #00f5ff}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;overflow-y:auto;flex:1}
.lang-btn{background:#ffffff08;border:1.5px solid #ffffff15;border-radius:12px;padding:10px 8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all 0.15s}
.lang-btn:active,.lang-btn.selected{background:#00f5ff22;border-color:#00f5ff66}
.lang-btn .flag{font-size:20px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes countPop{0%{transform:scale(1.5);opacity:0}30%{transform:scale(1);opacity:1}90%{opacity:1}100%{opacity:0;transform:scale(0.8)}}
@keyframes langIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
</style>

let audioCtx=null,musicPlaying=false,musicGain=null,musicTimers=[];

function getAC(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
  return audioCtx;
}
function playTone(freq,type,dur,vol,startFreq){
  if(!settings.sound)return;
  try{
    const ctx=getAC(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type||"sine";
    if(startFreq){o.frequency.setValueAtTime(startFreq,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(freq,ctx.currentTime+dur*0.8);}
    else o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol||0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playNoise(dur,vol){
  if(!settings.sound)return;
  try{
    const ctx=getAC(),buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();
    f.type="lowpass";f.frequency.value=400;
    src.buffer=buf;src.connect(f);f.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(vol||0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    src.start();
  }catch(e){}
}

// Coral Reef Music — bright, playful, melodic
function startMusic(){
  if(musicPlaying||!settings.music)return;
  musicPlaying=true;
  try{
    const ctx=getAC();
    musicGain=ctx.createGain();musicGain.gain.value=0;musicGain.connect(ctx.destination);
    musicGain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+2);

    // Bright xylophone melody — cheerful pentatonic loop
    const melody=[523,659,784,880,784,659,523,587,698,880,1047,880,698,587,523,659];
    let mi=0;
    function melNote(){
      if(!musicPlaying)return;
      const freq=melody[mi++%melody.length];
      const o=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter();
      f.type="lowpass";f.frequency.value=2000;
      o.type="triangle";o.frequency.value=freq;
      g.gain.setValueAtTime(0.45,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.38);
      o.connect(f);f.connect(g);g.connect(musicGain);
      o.start();o.stop(ctx.currentTime+0.38);
      // Vary tempo slightly for natural feel
      const tempo=[280,300,280,320,280,300,340,280];
      musicTimers.push(setTimeout(melNote,tempo[mi%tempo.length]));
    }
    musicTimers.push(setTimeout(melNote,300));

    // Bubbly bass — bouncy, playful
    const bassNotes=[130,164,196,130,146,174,130,164];
    let bi=0;
    function bassNote(){
      if(!musicPlaying)return;
      const freq=bassNotes[bi++%bassNotes.length];
      const o=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter();
      f.type="lowpass";f.frequency.value=500;
      o.type="sine";o.frequency.value=freq;
      g.gain.setValueAtTime(0.5,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
      o.connect(f);f.connect(g);g.connect(musicGain);
      o.start();o.stop(ctx.currentTime+0.22);
      musicTimers.push(setTimeout(bassNote,560+Math.random()*80));
    }
    musicTimers.push(setTimeout(bassNote,500));

    // Twinkling high harmonics — like sunlight through water
    const twinkles=[1047,1318,1568,2093,1760];
    function twinkle(){
      if(!musicPlaying)return;
      const freq=twinkles[Math.floor(Math.random()*twinkles.length)];
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";o.frequency.value=freq;
      g.gain.setValueAtTime(0.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
      o.connect(g);g.connect(musicGain);
      o.start();o.stop(ctx.currentTime+0.35);
      musicTimers.push(setTimeout(twinkle,350+Math.random()*550));
    }
    musicTimers.push(setTimeout(twinkle,900));

    // Soft chord pad — warm background harmony
    const chords=[[261,329,392],[293,369,440],[246,311,369],[261,329,415]];
    let ci=0;
    function chord(){
      if(!musicPlaying)return;
      const notes=chords[ci++%chords.length];
      notes.forEach(freq=>{
        const o=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter();
        f.type="lowpass";f.frequency.value=600;
        o.type="sine";o.frequency.value=freq;
        g.gain.setValueAtTime(0,ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+0.3);
        g.gain.linearRampToValueAtTime(0,ctx.currentTime+1.8);
        o.connect(f);f.connect(g);g.connect(musicGain);
        o.start();o.stop(ctx.currentTime+1.8);
      });
      musicTimers.push(setTimeout(chord,1800+Math.random()*400));
    }
    musicTimers.push(setTimeout(chord,1200));

    // Bubble pop percussion — light, airy
    function bubblePop(){
      if(!musicPlaying)return;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="sine";
      o.frequency.setValueAtTime(800+Math.random()*400,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.12,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      o.connect(g);g.connect(musicGain);
      o.start();o.stop(ctx.currentTime+0.08);
      musicTimers.push(setTimeout(bubblePop,600+Math.random()*800));
    }
    musicTimers.push(setTimeout(bubblePop,700));

  }catch(e){}
}

function stopMusic(){
  musicPlaying=false;
  musicTimers.forEach(t=>clearTimeout(t));musicTimers=[];
  if(musicGain){try{musicGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);}catch(e){}}
}
function pauseMusic(){try{if(audioCtx)audioCtx.suspend();}catch(e){}}
function resumeMusic(){try{if(audioCtx)audioCtx.resume();}catch(e){}}

// ── Leaderboard ────────────────────────────────────────────────────────────
async function loadBoard(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/scores?select=nick,score,boost,date,flag&order=score.desc&limit=100",{headers:SB_H});
    if(!r.ok)throw new Error();
    return await r.json();
  }catch{return JSON.parse(localStorage.getItem("or_board")||"[]");}
}
async function submitScore(nick,score,boost){
  const date=new Date().toLocaleDateString("pl-PL");
  const flag=getLangFlag(lang||"en");
  try{
    const r=await fetch(SB_URL+"/rest/v1/scores?nick=eq."+encodeURIComponent(nick)+"&select=id,score",{headers:SB_H});
    const ex=await r.json();
    if(ex.length>0){
      if(score>ex[0].score)await fetch(SB_URL+"/rest/v1/scores?id=eq."+ex[0].id,{method:"PATCH",headers:SB_H,body:JSON.stringify({score,boost,date,flag})});
    }else{
      await fetch(SB_URL+"/rest/v1/scores",{method:"POST",headers:{...SB_H,"Prefer":"return=minimal"},body:JSON.stringify({nick,score,boost,date,flag})});
    }
  }catch{
    const b=JSON.parse(localStorage.getItem("or_board")||"[]"),i=b.findIndex(e=>e.nick===nick);
    const entry={nick,score,boost,date,flag};
    if(i!==-1){if(score>b[i].score)b[i]=entry;}else b.push(entry);
    b.sort((a,c)=>c.score-a.score);localStorage.setItem("or_board",JSON.stringify(b.slice(0,100)));
  }
  return await loadBoard();
}

function lerpCol(a,b,t){
  const ah=a.slice(1),bh=b.slice(1);
  const ar=[parseInt(ah.slice(0,2),16),parseInt(ah.slice(2,4),16),parseInt(ah.slice(4,6),16)];
  const br=[parseInt(bh.slice(0,2),16),parseInt(bh.slice(2,4),16),parseInt(bh.slice(4,6),16)];
  return"#"+ar.map((v,i)=>Math.round(lerp(v,br[i],t)).toString(16).padStart(2,"0")).join("");
}
function drawBgFish(ctx,f,t){
  const sp=f.sp,bob=Math.sin(t*0.04+f.bobPhase)*3.5,tw=Math.sin(t*0.12+f.tailPhase)*0.28;

    ctx.beginPath();ctx.arc(0,0,bw*0.72,0,Math.PI*2);

    ctx.beginPath();ctx.arc(bw*0.37,-bh*0.12,bh*0.13,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();

    ctx.strokeStyle=sp.accent+"bb";ctx.lineWidth=2.5;[-7,0,7].forEach(sx=>{ctx.beginPath();ctx.moveTo(sx,-bh*0.95);ctx.lineTo(sx,bh*0.95);ctx.stroke();});
    ctx.beginPath();ctx.moveTo(-bw*0.3,-bh);ctx.lineTo(bw*0.4,-bh*1.85);ctx.lineTo(bw*0.65,-bh);ctx.closePath();ctx.fillStyle=sp.belly+"99";ctx.fill();
    ctx.save();ctx.rotate(tw);ctx.beginPath();ctx.moveTo(-bw*0.88,0);ctx.lineTo(-bw*1.55,-bh*0.75);ctx.lineTo(-bw*1.55,bh*0.75);ctx.closePath();ctx.fillStyle=sp.tail;ctx.fill();ctx.restore();
    ctx.beginPath();ctx.arc(bw*0.52,-bh*0.18,bh*0.2,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
    ctx.beginPath();ctx.arc(bw*0.54,-bh*0.18,bh*0.1,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
  }else{
    ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);
    const gb=ctx.createLinearGradient(0,-bh,0,bh);gb.addColorStop(0,sp.back);gb.addColorStop(0.45,sp.belly);gb.addColorStop(1,sp.back);ctx.fillStyle=gb;ctx.fill();
    if(sp.type==="clown"){ctx.strokeStyle="#ffffffcc";ctx.lineWidth=2.8;[-8,3].forEach(sx=>{ctx.beginPath();ctx.moveTo(sx,-bh*1.05);ctx.lineTo(sx,bh*1.05);ctx.stroke();});}
    else if(sp.type==="stripe"){ctx.strokeStyle=sp.accent+"bb";ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-bw*0.9,0);ctx.lineTo(bw*0.7,0);ctx.stroke();}
    else if(sp.type==="lion"){ctx.strokeStyle="#ffffffaa";ctx.lineWidth=2;[-10,-3,4,10].forEach(sx=>{ctx.beginPath();ctx.moveTo(sx,-bh);ctx.lineTo(sx,bh);ctx.stroke();});}
    ctx.beginPath();ctx.moveTo(-bw*0.1,-bh);ctx.lineTo(bw*0.25,-bh*1.65);ctx.lineTo(bw*0.6,-bh);ctx.closePath();ctx.fillStyle=sp.accent+"55";ctx.fill();
    ctx.beginPath();ctx.ellipse(bw*0.1,bh*0.3,bw*0.22,bh*0.38,0.5,0,Math.PI*2);ctx.fillStyle=sp.belly+"66";ctx.fill();
    ctx.save();ctx.rotate(tw);ctx.beginPath();ctx.moveTo(-bw*0.82,0);ctx.lineTo(-bw*1.48,-bh*0.72);ctx.lineTo(-bw*1.48,bh*0.72);ctx.closePath();ctx.fillStyle=sp.tail;ctx.fill();ctx.restore();
    ctx.beginPath();ctx.arc(bw*0.56,-bh*0.22,bh*0.3,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
    ctx.beginPath();ctx.arc(bw*0.58,-bh*0.22,bh*0.16,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
    ctx.beginPath();ctx.arc(bw*0.61,-bh*0.25,bh*0.06,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  }
  ctx.restore();
}
function drawFish(ctx,x,y,angle,shield,star,tiny){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  if(tiny)ctx.scale(0.5,0.5);
  ctx.shadowColor=star?"#ffd700":shield?"#00f5ff":"#ff6bb5";ctx.shadowBlur=star?24:shield?20:12;
  ctx.beginPath();ctx.ellipse(0,0,22,14,0,0,Math.PI*2);
  const g=ctx.createRadialGradient(-4,-4,2,0,0,22);
  if(star){g.addColorStop(0,"#fff7aa");g.addColorStop(1,"#ffa500");}else{g.addColorStop(0,"#ff9ecd");g.addColorStop(1,"#e0357a");}
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,0.25)";ctx.lineWidth=1;
  for(let i=-10;i<=10;i+=7){ctx.beginPath();ctx.arc(i,0,6,0.3,Math.PI-0.3);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(-20,0);ctx.lineTo(-34,-12);ctx.lineTo(-34,12);ctx.closePath();ctx.fillStyle=star?"#ffcc00":"#c0256a";ctx.fill();
  ctx.beginPath();ctx.arc(13,-4,5,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  ctx.beginPath();ctx.arc(14,-4,3,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
  ctx.beginPath();ctx.arc(15,-5,1,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(10,-24);ctx.lineTo(16,-14);ctx.closePath();ctx.fillStyle=star?"#ffd700":"#ff69b4";ctx.globalAlpha=0.7;ctx.fill();ctx.globalAlpha=1;
  if(shield){ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);ctx.strokeStyle="#00f5ff";ctx.lineWidth=3;ctx.globalAlpha=0.6;ctx.stroke();ctx.globalAlpha=0.08;ctx.fillStyle="#00f5ff";ctx.fill();ctx.globalAlpha=1;}
  ctx.restore();
}
function drawWorm(ctx,x,y,flipped){
  ctx.save();ctx.translate(x,y);if(flipped)ctx.scale(1,-1);
  const segs=[[[0,0],[-6,-4],[-10,2]],[[-10,2],[-14,-3],[-18,3]],[[-18,3],[-20,-1],[-22,1]]];
  ctx.lineWidth=4;ctx.lineCap="round";ctx.strokeStyle="#cc4400";ctx.shadowColor="#ff6600";ctx.shadowBlur=3;
  segs.forEach(([[x1,y1],[cx1,cy1],[x2,y2]])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx1,cy1,x2,y2);ctx.stroke();});
  ctx.beginPath();ctx.arc(-22,1,3.5,0,Math.PI*2);ctx.fillStyle="#dd3300";ctx.fill();
  ctx.beginPath();ctx.arc(-23.5,0,1,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
  ctx.restore();
}
function drawFreeWorm(ctx,w,t2){
  const bob=Math.sin(t2*0.06+w.bobPhase)*6;
  ctx.save();ctx.translate(w.x,w.y+bob);
  // Neon glow ring
  ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);
  ctx.strokeStyle="#00ffaa";ctx.lineWidth=2;ctx.shadowColor="#00ffaa";ctx.shadowBlur=12;
  ctx.globalAlpha=0.5+Math.sin(t2*0.1+w.bobPhase)*0.2;ctx.stroke();
  ctx.globalAlpha=0.12;ctx.fillStyle="#00ffaa";ctx.fill();
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  // Worm centered in the circle — shifted right by 10px so body sits in middle
  ctx.save();ctx.translate(10,0);
  const segs=[[[0,0],[-5,-3],[-9,2]],[[-9,2],[-13,-3],[-17,2]],[[-17,2],[-19,-1],[-21,1]]];
  ctx.lineWidth=3.5;ctx.lineCap="round";ctx.strokeStyle="#cc4400";
  segs.forEach(([[x1,y1],[cx1,cy1],[x2,y2]])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx1,cy1,x2,y2);ctx.stroke();});
  ctx.beginPath();ctx.arc(-21,1,3,0,Math.PI*2);ctx.fillStyle="#dd3300";ctx.fill();
  ctx.restore();
  // +10 label centered above ring
  ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillStyle="#00ffaa";
  ctx.fillText("+10",0,-24);
  ctx.restore();
}
function drawPU(ctx,pu,t2){
  const bob=Math.sin(t2*0.05+pu.id*10)*5,col=PU_COLORS[pu.type];
  ctx.save();ctx.translate(pu.x,pu.y+bob);ctx.shadowColor=col;ctx.shadowBlur=18;
  ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fillStyle=col+"33";ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();ctx.shadowBlur=0;
  ctx.font="18px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(PU_ICONS[pu.type],0,1);ctx.restore();
}
function drawHook(ctx,cx,hookY,fromTop){
  ctx.save();
  ctx.beginPath();ctx.setLineDash([6,5]);ctx.strokeStyle="rgba(210,240,255,0.55)";ctx.lineWidth=1.5;
  if(fromTop){ctx.moveTo(cx,0);ctx.lineTo(cx,hookY-38);}else{ctx.moveTo(cx,H);ctx.lineTo(cx,hookY+38);}
  ctx.stroke();ctx.setLineDash([]);
  ctx.save();if(!fromTop){ctx.translate(cx,hookY);ctx.scale(1,-1);ctx.translate(-cx,-hookY);}
  const ex=cx,ey=hookY-36,sb=hookY+2;
  ctx.beginPath();ctx.arc(ex,ey,5,0,Math.PI*2);ctx.strokeStyle="#c8e0ff";ctx.lineWidth=2;ctx.shadowColor="#aef0ff";ctx.shadowBlur=6;ctx.stroke();
  ctx.beginPath();ctx.moveTo(ex,ey+5);ctx.lineTo(ex,sb);ctx.strokeStyle="#c8e0ff";ctx.lineWidth=4;ctx.lineCap="round";ctx.shadowBlur=8;ctx.stroke();
  ctx.beginPath();ctx.moveTo(ex,sb);ctx.bezierCurveTo(ex,sb+16,ex-22,sb+16,ex-22,sb+2);ctx.strokeStyle="#c8e0ff";ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.moveTo(ex-22,sb+2);ctx.lineTo(ex-14,sb-8);ctx.strokeStyle="#e8f4ff";ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.moveTo(ex-18,sb-3);ctx.lineTo(ex-10,sb-1);ctx.strokeStyle="#e8f4ff";ctx.lineWidth=2;ctx.stroke();
  ctx.restore();
  if(fromTop)drawWorm(ctx,cx-22,hookY+4,false);else drawWorm(ctx,cx-22,hookY-4,true);
  ctx.restore();
}
function hitsHook(fx,fy,p,tiny){
  const cx=p.x+PIPE_W/2,FR=tiny?7:13;
  if(fy-FR<p.top&&fx+FR>cx-4&&fx-FR<cx+4)return true;
  if(fy+FR>p.top+GAP&&fx+FR>cx-4&&fx-FR<cx+4)return true;
  if(fy>p.top-4&&fy<p.top+20&&fx+FR>cx-28&&fx-FR<cx+2)return true;
  if(fy<p.top+GAP+4&&fy>p.top+GAP-20&&fx+FR>cx-28&&fx-FR<cx+2)return true;
  return false;
}

// ── Game ───────────────────────────────────────────────────────────────────
function initGame(){
  _lastTop=H/2-GAP/2;
  gs={fish:{x:100,y:H/2,vy:0,angle:0},pipes:[makePipe(W+200),makePipe(W+500)],pus:[],freeWorms:[],nextWorm:ri(300,500),
    bgFish:Array.from({length:10},()=>makeBgFish(true)),
    bubbles:Array.from({length:20},()=>({x:ri(0,W),y:ri(0,H),r:ri(3,8),vy:ri(1,3)*-0.4,a:Math.random()*0.4+0.1})),
    particles:[],score:0,combo:0,comboTimer:0,activePU:null,puTimer:0,bgPalette:0,bgT:0,t:0,alive:true,usedBoost:false,pipeInterval:150,nextPipe:150};
  lastTs=0;paused=false;
}

function gameLoop(ts){
  if(paused)return;
  if(!lastTs)lastTs=ts;
  const dt=Math.min(ts-lastTs,50)/16.67;lastTs=ts;
  const s=gs;if(!s||!s.alive)return;
  const canvas=document.getElementById("canvas");if(!canvas)return;
  const ctx=canvas.getContext("2d");
  s.t+=dt;s.bgT+=0.003*dt;if(s.bgT>=1){s.bgT=0;s.bgPalette=(s.bgPalette+1)%BG.length;}
  const spd=PIPE_SPEED*(s.activePU==="boost"?2.0:1)*(1+s.score*0.002)*dt;
  s.fish.vy+=GRAVITY*dt;if(s.fish.vy>6)s.fish.vy=6;
  s.fish.y+=s.fish.vy*dt;s.fish.angle=Math.max(-0.5,Math.min(1.2,s.fish.vy*0.07));
  if(s.fish.y<0||s.fish.y>H){die();return;}
  s.nextPipe-=dt;
  if(s.nextPipe<=0){const np=makePipe(W+20);s.pipes.push(np);s.nextPipe=s.pipeInterval;if(Math.random()<0.4)s.pus.push(makePU(W+20,np.top));}
  s.pipes=s.pipes.filter(p=>p.x+PIPE_W>-10);s.pus=s.pus.filter(p=>p.x>-20&&!p.collected);
  for(const p of s.pipes)p.x-=spd;for(const pu of s.pus)pu.x-=spd;
  for(const w of s.freeWorms)w.x-=spd*0.7;s.freeWorms=s.freeWorms.filter(w=>w.x>-40&&!w.collected);
  s.nextWorm-=dt;if(s.nextWorm<=0){s.freeWorms.push(makeFreeWorm(W+30));s.nextWorm=ri(250,450);}
  for(const w of s.freeWorms){if(!w.collected&&Math.hypot(s.fish.x-w.x,s.fish.y-w.y)<28){w.collected=true;s.score+=10;updateHUD();sfx.worm();for(let i=0;i<8;i++)s.particles.push({x:w.x,y:w.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30,col:"#00ffaa"});}}
  for(const f of s.bgFish){f.x-=f.speed*dt;if(f.x<-160)Object.assign(f,makeBgFish(false));}
  for(const pu of s.pus){
    if(!pu.collected&&Math.hypot(s.fish.x-pu.x,s.fish.y-pu.y)<30){
      pu.collected=true;s.activePU=pu.type;s.puTimer=600;
      if(pu.type==="boost")s.usedBoost=true;
      if(pu.type==="star"){s.score+=5;updateHUD();}
      sfx[pu.type]&&sfx[pu.type]();
      const puLabels={boost:'🚀 Speed Boost!',shield:'🛡️ Bubble Shield!',star:'⭐ Star Rush!',tiny:'🐡 Tiny Fish!'};
      showPULabel(puLabels[pu.type]||pu.type);updatePUHud();
    }
  }
  if(s.puTimer>0){s.puTimer-=dt;updatePUHud();if(s.puTimer<=0){s.activePU=null;s.puTimer=0;updatePUHud();}}
  for(const p of s.pipes){
    const fx=s.fish.x,fy=s.fish.y;
    if(!p.scored&&p.x+PIPE_W<fx){p.scored=true;s.score++;s.combo++;s.comboTimer=120;for(let i=0;i<8;i++)s.particles.push({x:fx,y:fy,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:40,col:["#ffd700","#ff6bb5","#00f5ff"][ri(0,2)]});sfx.score();if(s.combo>=5)sfx.combo(s.combo);updateHUD();}
    if(s.activePU==="boost"||s.activePU==="star")continue;
    if(hitsHook(s.fish.x,s.fish.y,p,s.activePU==="tiny")){
      if(!p.shieldUsed&&s.activePU==="shield"){p.shieldUsed=true;s.activePU=null;s.puTimer=0;updatePUHud();sfx.shield();for(let i=0;i<16;i++)s.particles.push({x:s.fish.x,y:s.fish.y,vx:(Math.random()-0.5)*9,vy:(Math.random()-0.5)*9,life:35,col:"#00f5ff"});}
      else if(!p.shieldUsed){die();return;}
    }
  }
  s.comboTimer-=dt;if(s.comboTimer<=0&&s.combo>0){s.combo=0;updateHUD();}
  s.bubbles.forEach(b=>{b.y+=b.vy*dt;if(b.y<-10){b.y=H+10;b.x=ri(0,W);}});
  s.particles=s.particles.filter(p=>p.life>0);s.particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.15*dt;p.life-=dt;});
  // draw
  const pal=BG[s.bgPalette],np2=BG[(s.bgPalette+1)%BG.length];
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,lerpCol(pal[0],np2[0],s.bgT));bg.addColorStop(0.5,lerpCol(pal[1],np2[1],s.bgT));bg.addColorStop(1,lerpCol(pal[2],np2[2],s.bgT));ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=0.04+Math.sin(s.t*0.02)*0.02;for(let i=0;i<5;i++){const rx=(i*120+s.t*0.3)%W;ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx+40,H);ctx.lineTo(rx+60,H);ctx.lineTo(rx+20,0);ctx.closePath();ctx.fillStyle="#aef0ff";ctx.fill();}ctx.restore();
  s.bubbles.forEach(b=>{ctx.save();ctx.globalAlpha=b.a;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle="#aef0ff";ctx.lineWidth=1;ctx.stroke();ctx.restore();});
  s.freeWorms.filter(w=>!w.collected).forEach(w=>drawFreeWorm(ctx,w,s.t));
  for(const f of s.bgFish)drawBgFish(ctx,f,s.t);
  ctx.save();ctx.fillStyle="#0a4a3a";ctx.fillRect(0,0,W,8);ctx.fillRect(0,H-8,W,8);ctx.restore();
  s.pipes.forEach(p=>{drawHook(ctx,p.x+PIPE_W/2,p.top,true);drawHook(ctx,p.x+PIPE_W/2,p.top+GAP,false);});
  s.pus.filter(p=>!p.collected).forEach(p=>drawPU(ctx,p,s.t));
  s.particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life/40);ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.restore();});
  drawFish(ctx,s.fish.x,s.fish.y,s.fish.angle,s.activePU==="shield",s.activePU==="star",s.activePU==="tiny");
  raf=requestAnimationFrame(gameLoop);
}

async function die(){
  if(gs)gs.alive=false;cancelAnimationFrame(raf);
  stopMusic();sfx.die();vibrate(300);
  const finalScore=gs.score;screen="dead";render();
  const board=await submitScore(nick,finalScore,gs.usedBoost);
  const rank=board.findIndex(e=>e.nick===nick)+1;
  const rb=document.getElementById("rank-badge");
  if(rb&&rank>0)rb.innerHTML=`${t("yourPos")}: <b>#${rank}</b> ${t("of")}`;
}

// ── Pause ──────────────────────────────────────────────────────────────────
function togglePause(){
  if(screen!=="playing"||!gs||!gs.alive)return;
  if(!paused){paused=true;cancelAnimationFrame(raf);pauseMusic();sfx.pause();showPauseOverlay();}
  else resumeFromPause();
}
function showPauseOverlay(){
  const wrap=document.getElementById("game-wrap");if(!wrap)return;
  if(document.getElementById("pause-overlay"))return;
  const div=document.createElement("div");div.id="pause-overlay";div.className="pause-overlay";
  div.innerHTML=`<div class="pause-card" style="animation:fadeInUp 0.3s ease">
    <div class="pause-title">⏸ ${t("paused")}</div>
    <div class="pause-score">${t("score")}: <b style="color:#ffd700">${gs?gs.score:0}</b></div>
    <button id="resume-btn" class="btn" style="width:200px;animation:pulse 1.5s infinite">${t("resume")}</button>
    <button id="quit-btn" class="btn btn-ghost" style="width:200px;font-size:14px">${t("quit")}</button>
  </div>`;
  wrap.appendChild(div);
  document.getElementById("resume-btn").onclick=e=>{e.stopPropagation();resumeFromPause();};
  document.getElementById("quit-btn").onclick=e=>{e.stopPropagation();paused=false;stopMusic();screen="nick";render();};
}
function resumeFromPause(){
  document.getElementById("pause-overlay")?.remove();
  sfx.resume();
  startCountdown(()=>{paused=false;resumeMusic();lastTs=0;raf=requestAnimationFrame(gameLoop);});
}
function startCountdown(onDone){
  countdownActive=true;
  const wrap=document.getElementById("game-wrap");if(!wrap)return;
  let n=3;const C=2*Math.PI*42;
  function showNum(){
    document.getElementById("countdown-el")?.remove();
    if(n<0){countdownActive=false;onDone();return;}
    sfx.countdown(n);
    const div=document.createElement("div");div.id="countdown-el";
    div.style.cssText="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none";
    if(n===0){div.innerHTML=`<div style="font-size:56px;font-weight:800;color:#00ffaa;text-shadow:0 0 30px #00ffaa;animation:countPop 0.6s ease forwards">GO!</div>`;}
    else{const off=C*(1-n/3);div.innerHTML=`<div class="countdown-circle"><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#ffffff22" stroke-width="6"/><circle cx="50" cy="50" r="42" fill="none" stroke="#00f5ff" stroke-width="6" stroke-dasharray="${C}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 0.9s linear"/></svg><div class="countdown-num" style="animation:countPop 0.4s ease">${n}</div></div>`;}
    wrap.appendChild(div);n--;setTimeout(showNum,n<0?600:1000);
  }
  showNum();
}

// ── HUD ────────────────────────────────────────────────────────────────────
function updateHUD(){
  const el=document.getElementById("score-hud");if(el)el.textContent=gs.score;
  const cel=document.getElementById("combo-hud");
  if(cel){if(gs.combo>=3){cel.textContent=`x${gs.combo} COMBO${gs.combo>=10?"🔥":""}`;cel.style.display="block";}else cel.style.display="none";}
}
let puLT=null;
function showPULabel(txt){
  const el=document.getElementById("pu-flash");if(!el)return;
  el.textContent=txt;el.style.display="block";clearTimeout(puLT);puLT=setTimeout(()=>{if(el)el.style.display="none";},1800);
}
function updatePUHud(){
  const s=gs,ind=document.getElementById("pu-ind");if(!ind)return;
  if(s&&s.activePU){
    ind.style.display="block";ind.style.borderColor=PU_COLORS[s.activePU];ind.style.background=PU_COLORS[s.activePU]+"33";
    ind.querySelector(".pu-label").textContent=PU_ICONS[s.activePU]+" "+s.activePU.toUpperCase();
    const pct=Math.max(0,(s.puTimer/600)*100);const bar=ind.querySelector(".pu-bar");bar.style.width=pct+"%";bar.style.background=PU_COLORS[s.activePU];
  }else{ind.style.display="none";}
}

  const makeToggle=(id,key,cb)=>{

// ── Main screens ───────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(screen==="settings"){renderSettings();return;}
  if(screen==="nick"){
    app.innerHTML=`<div class="card">
      <div class="logo">🐠 Ocean Rush</div>
      <p class="sub">${t("depthsAwait")}</p>
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <input id="nick-input" placeholder="${t("yourNick")}" maxlength="16" autocomplete="off" style="flex:1"/>
        <span style="font-size:22px;cursor:pointer" id="flag-btn" title="${t("language")}">${getLangFlag(lang||"en")}</span>
      </div>
      <button class="btn" id="play-btn">${t("dive")}</button>
      <button class="btn btn-purple" id="board-btn">${t("ranking")}</button>
      <button class="btn btn-orange" id="powers-btn">${t("powers")}</button>
      <button class="btn btn-ghost" id="settings-btn">${t("settings")}</button>
    </div>`;
    const inp=document.getElementById("nick-input");inp.focus();inp.addEventListener("keydown",e=>{if(e.key==="Enter")startGame();});
    document.getElementById("play-btn").onclick=startGame;
    document.getElementById("board-btn").onclick=showBoard;
    document.getElementById("powers-btn").onclick=()=>{screen="powers";render();};
    document.getElementById("settings-btn").onclick=()=>{screen="settings";render();};
    document.getElementById("flag-btn").onclick=()=>showLangPicker(render);
    startMusic();
    return;
  }
  if(screen==="powers"){
    app.innerHTML=`<div class="panel">
      <div class="panel-header"><div class="logo2">${t("powers")}</div></div>
      <div class="plist">${[
        {icon:"🚀",col:"#ff6b35",name:"Speed Boost",desc:lang==="pl"?"Lecisz przez wszystko! Prędkość x2, niezniszczalny 10 sek.":lang==="de"?"Fliegst durch alles! Geschwindigkeit x2, unzerstörbar 10 Sek.":"Full speed x2 + invincible for 10 sec. Fly through everything!"},
        {icon:"🛡️",col:"#00f5ff",name:"Bubble Shield",desc:lang==="pl"?"Tęczowa bańka — jeden haczyk nie zabija!":lang==="de"?"Schutzblase — ein Haken tötet nicht!":"Rainbow bubble — one hook won't kill you!"},
        {icon:"⭐",col:"#ffd700",name:"Star Rush",desc:lang==="pl"?"Złoty tryb + natychmiastowe +5 pkt!":lang==="de"?"Goldmodus + sofortige +5 Punkte!":"Gold mode + instant +5 pts. Invincible!"},
        {icon:"🐡",col:"#ff44cc",name:"Tiny Fish",desc:lang==="pl"?"Zmniejszasz się o połowę — łatwiej przez haczyki!":lang==="de"?"Wirst halb so groß — leichter durch Haken!":"Half size — smaller hitbox, easier through hooks!"},
      ].map(p=>`<div class="pcard"><div class="picon">${p.icon}</div><div class="pdot" style="background:${p.col};box-shadow:0 0 8px ${p.col}"></div><div><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div><div class="pdur">⏱ 10 sec</div></div></div>`).join("")}
      <div class="pcard"><div class="picon">🪱</div><div class="pdot" style="background:#00ffaa;box-shadow:0 0 8px #00ffaa"></div><div><div class="pname">${t("wormBonus")}</div><div class="pdesc">${t("wormDesc")}</div><div class="pdur">${t("bonusPoints")}</div></div></div>
      </div>
      <div style="padding:0 16px 16px"><button class="btn" id="back-btn">${t("back")}</button></div>
    </div>`;
    document.getElementById("back-btn").onclick=()=>{screen="nick";render();};return;
  }
  if(screen==="board"){
    app.innerHTML=`<div class="panel">
      <div class="panel-header"><div class="logo2">🏆 TOP 100</div><div class="sub">${t("globalRanking")}</div></div>
      <div class="blist"><div class="loading">${t("loading")}</div></div>
      <div style="padding:0 16px 16px"><button class="btn" id="back-btn">${t("back")}</button></div>
    </div>`;
    document.getElementById("back-btn").onclick=()=>{screen="nick";render();};
    loadBoard().then(board=>{
      const bl=document.querySelector(".blist");if(!bl)return;
      bl.innerHTML=board.length===0?`<div class="empty">${t("noScores")}</div>`:
        board.map((e,i)=>`<div class="brow ${e.nick===nick?"brow-me":""} ${i<3?"brow-top":""}">
          <span class="rnum">${i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1)}</span>
          <span class="rflag">${e.flag||"🌐"}</span>
          <span class="rnick">${e.nick}${e.boost?" 🚀":""}</span>
          <span class="rscore">${e.score}</span>
          <span class="rdate">${e.date}</span>
        </div>`).join("");
    });return;
  }
  if(screen==="dead"){
    app.innerHTML=`<div class="card">
      <div style="font-size:52px">💀</div>
      <div class="logo">${t("gameOver")}</div>
      <div style="font-size:22px;color:#cde">${t("score")}: <b style="color:#ffd700">${gs?gs.score:0}</b></div>
      <div id="rank-badge" class="rank-badge" style="opacity:0.5">${t("saving")}</div>
      <button class="btn" id="retry-btn">${t("playAgain")}</button>
      <button class="btn btn-purple" id="board-btn2">${t("seeRanking")}</button>
      <button class="btn btn-ghost" id="nick-btn">${t("changeNick")}</button>
    </div>`;
    document.getElementById("retry-btn").onclick=startGame;
    document.getElementById("board-btn2").onclick=showBoard;
    document.getElementById("nick-btn").onclick=()=>{screen="nick";render();};return;
  }
  if(screen==="ready"||screen==="playing"){
    const cw=Math.min(W,window.innerWidth-24);
    app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center">
      <div class="game-wrap" style="width:${cw}px;height:${Math.round(cw*(H/W))}px" id="game-wrap">
        <canvas id="canvas" width="${W}" height="${H}" style="width:${cw}px;height:${Math.round(cw*(H/W))}px"></canvas>
        <div class="hud"><div class="score-hud" id="score-hud">0</div><div class="combo-hud" id="combo-hud" style="display:none"></div></div>
        <div class="pu-ind" id="pu-ind" style="display:none"><div class="pu-label"></div><div class="pu-bar-bg"><div class="pu-bar" style="width:100%"></div></div></div>
        <div class="pu-flash" id="pu-flash" style="display:none"></div>
        ${screen==="ready"?`<div class="overlay" id="ready-overlay"><div class="overlay-card"><div style="font-size:40px">🐠</div><div style="font-size:22px;font-weight:800;color:#fff">${t("ready")}, ${nick}!</div><div style="font-size:13px;color:#aef0ff;margin-top:4px">${t("tap")}</div></div></div>`:""}
      </div>
      <div class="bottom-bar" style="width:${cw}px">
        <span style="color:#aef0ff;font-size:13px">👤 ${nick}</span>
        <button class="pause-btn" id="pause-btn">⏸</button>
        <button class="mini-btn" id="rank-btn">🏆</button>
      </div>
    </div>`;
    document.getElementById("game-wrap").addEventListener("pointerdown",tap);
    document.getElementById("pause-btn").onclick=e=>{e.stopPropagation();togglePause();};
    document.getElementById("rank-btn").onclick=e=>{e.stopPropagation();cancelAnimationFrame(raf);stopMusic();showBoard();};
    if(screen==="playing"){lastTs=0;raf=requestAnimationFrame(gameLoop);}
  }
}

function showBoard(){screen="board";render();}
function startGame(){
  const inp=document.getElementById("nick-input");if(inp)nick=inp.value.trim()||nick;if(!nick)return;
  cancelAnimationFrame(raf);stopMusic();initGame();screen="ready";render();
}
function tap(e){
  if(e)e.stopPropagation();if(countdownActive)return;
  if(paused){togglePause();return;}
  if(screen==="ready"){
    document.getElementById("ready-overlay")?.remove();
    screen="playing";lastTs=0;startMusic();raf=requestAnimationFrame(gameLoop);return;
  }
  if(screen==="playing"&&gs&&gs.alive){sfx.jump();gs.fish.vy=JUMP;for(let i=0;i<6;i++)gs.bubbles.push({x:gs.fish.x-10+Math.random()*20,y:gs.fish.y+Math.random()*10,r:ri(2,5),vy:-Math.random()*2-0.5,a:0.6});}
}
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();tap();}if(e.code==="Escape"||e.code==="KeyP")togglePause();});
document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});

// Show language picker on first visit
if(!lang){showLangPicker(()=>{lang=lang||detectLang();render();});}
else render();
</script>
</body>
</html>
