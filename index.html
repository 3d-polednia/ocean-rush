<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ocean Rush 🐠</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#060d1a;font-family:'Fredoka One','Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;overscroll-behavior:none}
#app{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh}
.card{background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #00f5ff44;border-radius:20px;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:14px;width:320px;box-shadow:0 0 40px #00f5ff22}
.logo{font-size:32px;font-weight:800;color:#fff;letter-spacing:1px;text-shadow:0 0 20px #00f5ff,0 0 40px #ff6bb5}
.logo2{font-size:26px;font-weight:800;color:#ffd700;text-shadow:0 0 15px #ffd700}
.sub{color:#7ad4f0;font-size:13px}
input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #00f5ff55;background:#0a1a30;color:#fff;font-size:16px;outline:none;font-family:inherit}
.btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#00b4d8,#0077b6);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px #00b4d844}
.btn-purple{background:linear-gradient(135deg,#7b2d8b,#4a0d6e);box-shadow:0 4px 20px #7b2d8b44}
.btn-orange{background:linear-gradient(135deg,#ff6b35,#b44fff);box-shadow:0 4px 20px #ff6b3544}
.btn-ghost{background:transparent;border:1.5px solid #ffffff33;box-shadow:none;color:#aaa}
.panel{width:340px;max-height:90vh;background:linear-gradient(145deg,#0d2040,#0a1628);border:1.5px solid #ffd70033;border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px #ffd70022}
.panel-header{padding:20px 20px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;border-bottom:1px solid #ffffff11}
.plist{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:12px}
.pcard{display:flex;align-items:center;gap:10px;background:#ffffff08;border:1px solid #ffffff12;border-radius:14px;padding:13px}
.picon{font-size:30px;flex-shrink:0;width:38px;text-align:center}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pname{font-size:15px;font-weight:800;color:#fff;line-height:1;margin-bottom:3px}
.pdesc{font-size:12px;color:#9bbdd4;line-height:1.4}
.pdur{font-size:11px;color:#556;margin-top:3px}
.blist{flex:1;overflow-y:auto;padding:8px 12px}
.brow{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;margin-bottom:4px;color:#cde;font-size:14px}
.brow-me{background:#00f5ff18;border:1.5px solid #00f5ff44}
.brow-top{background:#ffd70011}
.rnum{width:36px;font-weight:800;font-size:16px;flex-shrink:0}
.rnick{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rscore{font-weight:800;color:#ffd700;font-size:16px;flex-shrink:0}
.rdate{color:#556;font-size:11px;flex-shrink:0;width:50px;text-align:right}
.game-wrap{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 0 60px #00f5ff44}
canvas{display:block}
.hud{position:absolute;top:16px;left:0;right:0;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.score-hud{font-size:42px;font-weight:800;color:#fff;text-shadow:0 0 15px #00f5ff,2px 2px 0 #0003;line-height:1}
.combo-hud{font-size:16px;font-weight:700;color:#ffd700;text-shadow:0 0 10px #ffd700;margin-top:2px}
.pu-ind{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);border:2px solid;border-radius:20px;padding:6px 18px;color:#fff;font-size:13px;font-weight:700;letter-spacing:1px;backdrop-filter:blur(4px);min-width:160px;text-align:center}
.pu-bar-bg{width:100%;height:4px;background:#ffffff22;border-radius:2px;margin-top:4px;overflow:hidden}
.pu-bar{height:100%;border-radius:2px;transition:width 0.1s linear}
.pu-flash{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:800;color:#ffd700;text-shadow:0 0 20px #ffd700;pointer-events:none;white-space:nowrap}
.overlay{position:absolute;inset:0;background:#00000066;display:flex;align-items:center;justify-content:center}
.overlay-card{background:#0d2040ee;border:1.5px solid #00f5ff44;border-radius:16px;padding:24px 32px;text-align:center;display:flex;flex-direction:column;gap:6px}
.bottom-bar{margin-top:10px;display:flex;align-items:center;gap:16px}
.mini-btn{margin-left:auto;padding:7px 14px;border-radius:10px;border:1.5px solid #ffd70066;background:transparent;color:#ffd700;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.rank-badge{background:#ffd70022;border:1.5px solid #ffd70055;border-radius:10px;padding:8px 16px;color:#ffd700;font-size:14px;font-weight:700}
.loading{color:#7ad4f0;text-align:center;padding:20px;font-size:14px}
.empty{color:#556;text-align:center;padding:30px;font-size:14px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Config ─────────────────────────────────────────────────────────────────
const SB_URL="https://marqdclmevkwjqxrqztz.supabase.co";
const SB_KEY="sb_publishable_TnIV9ZKajk_-hDWgo5g7-Q_9L7CoNZE";

// ── Constants ──────────────────────────────────────────────────────────────
const W=480,H=640;
const GRAVITY=0.14,JUMP=-4.4,GAP=185,PIPE_W=62,PIPE_SPEED=2.2;
const PU_TYPES=["boost","shield","star","tiny"];
const PU_COLORS={boost:"#ff6b35",shield:"#00f5ff",star:"#ffd700",tiny:"#ff44cc"};
const PU_ICONS={boost:"🚀",shield:"🛡️",star:"⭐",tiny:"🐡"};
const PU_LABELS={boost:"Speed Boost!",shield:"Bubble Shield!",star:"Star Rush!",tiny:"Tiny Fish!"};
const BG=[["#0a1628","#0d2d4a","#0f3d6e"],["#1a0a2e","#2d0d4a","#4a0d6e"],["#0a2818","#0d4a2a","#0d6e3f"],["#1a1a0a","#3d3a0d","#5e550d"],["#1a0a0a","#4a0d1a","#6e0d2e"]];

// Realistic fish species [belly, back, tail, accent, eye, bw, bh, type, name]
const SPECIES=[
  {belly:"#ff7420",back:"#e85000",tail:"#cc4400",accent:"#fff",eye:"#fff",bw:26,bh:16,type:"clown",name:"Clownfish"},
  {belly:"#1565ff",back:"#0033cc",tail:"#ffd700",accent:"#00aaff",eye:"#fff",bw:28,bh:15,type:"tang",name:"Blue Tang"},
  {belly:"#c8e8ff",back:"#7ab8e8",tail:"#ffe000",accent:"#ffe000",eye:"#fff",bw:30,bh:13,type:"stripe",name:"Snapper"},
  {belly:"#00e8b0",back:"#00aa80",tail:"#ff7755",accent:"#44ffcc",eye:"#fff",bw:32,bh:17,type:"std",name:"Parrotfish"},
  {belly:"#ff3333",back:"#cc0000",tail:"#ff6666",accent:"#fff",eye:"#ffd700",bw:24,bh:15,type:"lion",name:"Lionfish"},
  {belly:"#ffe066",back:"#ffaa00",tail:"#ffe066",accent:"#222",eye:"#fff",bw:18,bh:24,type:"angel",name:"Angelfish"},
  {belly:"#ffe066",back:"#ccaa00",tail:"#aa8800",accent:"#553300",eye:"#fff",bw:20,bh:20,type:"puffer",name:"Pufferfish"},
  {belly:"#d8eeff",back:"#5588aa",tail:"#336688",accent:"#aaccee",eye:"#fff",bw:36,bh:12,type:"std",name:"Mackerel"},
];

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const lerp=(a,b,t)=>a+(b-a)*t;
let screen="nick",nick="",gs=null,raf=null,lastTs=0;

// ── Supabase leaderboard ──────────────────────────────────────────────────
const SB_HEADERS={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY};

async function loadBoard(){
  try{
    const r=await fetch(SB_URL+"/rest/v1/scores?select=nick,score,boost,date&order=score.desc&limit=100",{headers:SB_HEADERS});
    if(!r.ok)throw new Error();
    return await r.json();
  }catch{return JSON.parse(localStorage.getItem("or_board")||"[]");}
}

async function submitScore(nick,score,boost){
  const date=new Date().toLocaleDateString("pl-PL");
  try{
    // Check if nick exists
    const r=await fetch(SB_URL+"/rest/v1/scores?nick=eq."+encodeURIComponent(nick)+"&select=id,score",{headers:SB_HEADERS});
    const existing=await r.json();
    if(existing.length>0){
      if(score>existing[0].score){
        await fetch(SB_URL+"/rest/v1/scores?id=eq."+existing[0].id,{
          method:"PATCH",
          headers:SB_HEADERS,
          body:JSON.stringify({score,boost,date})
        });
      }
    }else{
      await fetch(SB_URL+"/rest/v1/scores",{
        method:"POST",
        headers:{...SB_HEADERS,"Prefer":"return=minimal"},
        body:JSON.stringify({nick,score,boost,date})
      });
    }
  }catch(e){
    // fallback to localStorage
    const board=JSON.parse(localStorage.getItem("or_board")||"[]");
    const i=board.findIndex(e=>e.nick===nick);
    const entry={nick,score,boost,date};
    if(i!==-1){if(score>board[i].score)board[i]=entry;}else board.push(entry);
    board.sort((a,b)=>b.score-a.score);
    localStorage.setItem("or_board",JSON.stringify(board.slice(0,100)));
  }
  return await loadBoard();
}

// ── Pipe / PU factories ────────────────────────────────────────────────────
let _lastTop=H/2-GAP/2;
function makePipe(x){
  const mn=Math.max(90,_lastTop-110),mx=Math.min(H-GAP-90,_lastTop+110);
  const top=ri(mn,mx);_lastTop=top;
  return{x,top,scored:false};
}
function makePU(x,gapTop){
  const type=PU_TYPES[ri(0,3)];
  return{x,y:ri(gapTop+50,gapTop+GAP-50),type,id:Math.random(),collected:false};
}

function makeFreeWorm(x,y){
  return{x,y:y||ri(60,H-60),id:Math.random(),collected:false,bobPhase:Math.random()*Math.PI*2};
}

function drawFreeWorm(ctx,w,t){
  const bob=Math.sin(t*0.06+w.bobPhase)*6;
  ctx.save();
  ctx.translate(w.x,w.y+bob);
  // neon glow ring
  ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);
  ctx.strokeStyle="#00ffaa";ctx.lineWidth=2;
  ctx.shadowColor="#00ffaa";ctx.shadowBlur=12;
  ctx.globalAlpha=0.6+Math.sin(t*0.1+w.bobPhase)*0.2;
  ctx.stroke();
  ctx.globalAlpha=0.15;ctx.fillStyle="#00ffaa";ctx.fill();
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  // worm body — 3 segments
  const segs=[[[0,0],[-5,-3],[-9,2]],[[-9,2],[-13,-3],[-17,2]],[[-17,2],[-19,-1],[-21,1]]];
  ctx.lineWidth=3.5;ctx.lineCap="round";
  ctx.strokeStyle="#cc4400";ctx.shadowColor="#ff6600";ctx.shadowBlur=3;
  segs.forEach(([[x1,y1],[cx1,cy1],[x2,y2]])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx1,cy1,x2,y2);ctx.stroke();
  });
  // head
  ctx.beginPath();ctx.arc(-21,1,3,0,Math.PI*2);
  ctx.fillStyle="#dd3300";ctx.fill();
  ctx.beginPath();ctx.arc(-22.5,0,0.9,0,Math.PI*2);
  ctx.fillStyle="#111";ctx.fill();
  // +10 label
  ctx.shadowBlur=0;
  ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillStyle="#00ffaa";
  ctx.fillText("+10",6,-14);
  ctx.restore();
}

// ── BG fish (swim right→left, face left) ──────────────────────────────────
function makeBgFish(preplace){
  const sp=SPECIES[ri(0,SPECIES.length-1)];
  return{
    x: preplace ? ri(0,W) : ri(W+20,W+140),
    y: ri(40,H-40),
    speed: ri(8,18)*0.1,
    sp,
    bobPhase: Math.random()*Math.PI*2,
    tailPhase: Math.random()*Math.PI*2,
    alpha: 0.4+Math.random()*0.25,
  };
}

function lerpCol(a,b,t){
  const ah=a.slice(1),bh=b.slice(1);
  const ar=[parseInt(ah.slice(0,2),16),parseInt(ah.slice(2,4),16),parseInt(ah.slice(4,6),16)];
  const br=[parseInt(bh.slice(0,2),16),parseInt(bh.slice(2,4),16),parseInt(bh.slice(4,6),16)];
  return"#"+ar.map((v,i)=>Math.round(lerp(v,br[i],t)).toString(16).padStart(2,"0")).join("");
}

// ── Draw background fish ───────────────────────────────────────────────────
function drawBgFish(ctx,f,t){
  const sp=f.sp;
  const bob=Math.sin(t*0.04+f.bobPhase)*3.5;
  const tailWag=Math.sin(t*0.12+f.tailPhase)*0.28;
  const bw=sp.bw,bh=sp.bh;
  ctx.save();
  ctx.translate(f.x,f.y+bob);
  // Fish face LEFT — mirror horizontally
  ctx.scale(-1,1);
  ctx.globalAlpha=f.alpha;

  if(sp.type==="puffer"){
    ctx.beginPath();ctx.arc(0,0,bw*0.72,0,Math.PI*2);
    const gr=ctx.createRadialGradient(-3,-3,1,0,0,bw*0.72);
    gr.addColorStop(0,sp.belly);gr.addColorStop(1,sp.back);
    ctx.fillStyle=gr;ctx.fill();
    ctx.fillStyle=sp.accent+"77";
    [[6,4,3],[-4,5,2],[5,-5,2],[-7,-3,2],[8,-4,2]].forEach(([sx,sy,sr])=>{ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();});
    ctx.save();ctx.rotate(tailWag);
    ctx.beginPath();ctx.moveTo(-bw*0.68,0);ctx.lineTo(-bw*1.15,-bh*0.45);ctx.lineTo(-bw*1.15,bh*0.45);ctx.closePath();
    ctx.fillStyle=sp.tail;ctx.fill();ctx.restore();
    ctx.beginPath();ctx.arc(bw*0.35,-bh*0.12,bh*0.24,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
    ctx.beginPath();ctx.arc(bw*0.37,-bh*0.12,bh*0.13,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
  } else if(sp.type==="angel"){
    ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);
    const ga=ctx.createRadialGradient(-2,-4,1,0,0,bh);
    ga.addColorStop(0,sp.belly);ga.addColorStop(1,sp.back);
    ctx.fillStyle=ga;ctx.fill();
    ctx.strokeStyle=sp.accent+"bb";ctx.lineWidth=2.5;
    [-7,0,7].forEach(sx=>{ctx.beginPath();ctx.moveTo(sx,-bh*0.95);ctx.lineTo(sx,bh*0.95);ctx.stroke();});
    ctx.beginPath();ctx.moveTo(-bw*0.3,-bh);ctx.lineTo(bw*0.4,-bh*1.85);ctx.lineTo(bw*0.65,-bh);ctx.closePath();
    ctx.fillStyle=sp.belly+"99";ctx.fill();
    ctx.save();ctx.rotate(tailWag);
    ctx.beginPath();ctx.moveTo(-bw*0.88,0);ctx.lineTo(-bw*1.55,-bh*0.75);ctx.lineTo(-bw*1.55,bh*0.75);ctx.closePath();
    ctx.fillStyle=sp.tail;ctx.fill();ctx.restore();
    ctx.beginPath();ctx.arc(bw*0.52,-bh*0.18,bh*0.2,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
    ctx.beginPath();ctx.arc(bw*0.54,-bh*0.18,bh*0.1,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
  } else {
    // Standard / clown / tang / lion / stripe
    ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);
    const gb=ctx.createLinearGradient(0,-bh,0,bh);
    gb.addColorStop(0,sp.back);gb.addColorStop(0.45,sp.belly);gb.addColorStop(1,sp.back);
    ctx.fillStyle=gb;ctx.fill();

    if(sp.type==="clown"){
      ctx.strokeStyle="#ffffffcc";ctx.lineWidth=2.8;
      [-8,3].forEach(sx=>{ctx.beginPath();ctx.moveTo(sx,-bh*1.05);ctx.lineTo(sx,bh*1.05);ctx.stroke();});
    } else if(sp.type==="stripe"){
      ctx.strokeStyle=sp.accent+"bb";ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(-bw*0.9,0);ctx.lineTo(bw*0.7,0);ctx.stroke();
    } else if(sp.type==="lion"){
      ctx.strokeStyle="#ffffffaa";ctx.lineWidth=2;
      [-10,-3,4,10].forEach(sx=>{ctx.beginPath();ctx.moveTo(sx,-bh);ctx.lineTo(sx,bh);ctx.stroke();});
      ctx.strokeStyle=sp.back;ctx.lineWidth=1.5;
      for(let i=-8;i<=8;i+=4){ctx.beginPath();ctx.moveTo(i,-bh);ctx.lineTo(i-1,-bh-8);ctx.stroke();}
    }

    // dorsal fin
    ctx.beginPath();ctx.moveTo(-bw*0.1,-bh);ctx.lineTo(bw*0.25,-bh*1.65);ctx.lineTo(bw*0.6,-bh);ctx.closePath();
    ctx.fillStyle=sp.accent+"55";ctx.fill();
    // pectoral fin
    ctx.beginPath();ctx.ellipse(bw*0.1,bh*0.3,bw*0.22,bh*0.38,0.5,0,Math.PI*2);
    ctx.fillStyle=sp.belly+"66";ctx.fill();
    // tail with wag
    ctx.save();ctx.rotate(tailWag);
    ctx.beginPath();ctx.moveTo(-bw*0.82,0);ctx.lineTo(-bw*1.48,-bh*0.72);ctx.lineTo(-bw*1.48,bh*0.72);ctx.closePath();
    ctx.fillStyle=sp.tail;ctx.fill();ctx.restore();
    // eye
    ctx.beginPath();ctx.arc(bw*0.56,-bh*0.22,bh*0.3,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
    ctx.beginPath();ctx.arc(bw*0.58,-bh*0.22,bh*0.16,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
    ctx.beginPath();ctx.arc(bw*0.61,-bh*0.25,bh*0.06,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  }
  ctx.restore();
}

// ── Player fish ────────────────────────────────────────────────────────────
function drawFish(ctx,x,y,angle,shield,star,tiny){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.shadowColor=star?"#ffd700":shield?"#00f5ff":"#ff6bb5";
  ctx.shadowBlur=star?24:shield?20:12;
  ctx.beginPath();ctx.ellipse(0,0,22,14,0,0,Math.PI*2);
  const g=ctx.createRadialGradient(-4,-4,2,0,0,22);
  if(star){g.addColorStop(0,"#fff7aa");g.addColorStop(1,"#ffa500");}
  else{g.addColorStop(0,"#ff9ecd");g.addColorStop(1,"#e0357a");}
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,0.25)";ctx.lineWidth=1;
  for(let i=-10;i<=10;i+=7){ctx.beginPath();ctx.arc(i,0,6,0.3,Math.PI-0.3);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(-20,0);ctx.lineTo(-34,-12);ctx.lineTo(-34,12);ctx.closePath();
  ctx.fillStyle=star?"#ffcc00":"#c0256a";ctx.fill();
  ctx.beginPath();ctx.arc(13,-4,5,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  ctx.beginPath();ctx.arc(14,-4,3,0,Math.PI*2);ctx.fillStyle="#111";ctx.fill();
  ctx.beginPath();ctx.arc(15,-5,1,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(10,-24);ctx.lineTo(16,-14);ctx.closePath();
  ctx.fillStyle=star?"#ffd700":"#ff69b4";ctx.globalAlpha=0.7;ctx.fill();ctx.globalAlpha=1;
  if(shield){
    ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);
    ctx.strokeStyle="#00f5ff";ctx.lineWidth=3;ctx.globalAlpha=0.6;ctx.stroke();
    ctx.globalAlpha=0.08;ctx.fillStyle="#00f5ff";ctx.fill();ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawWorm(ctx, x, y, flipped){
  // Wriggling worm on the hook tip
  ctx.save();
  ctx.translate(x, y);
  if(flipped) ctx.scale(1,-1);
  // worm body — 3 segments curving left (toward player)
  const segs=[
    [0,0,  -6,-4,  -10,2],
    [-10,2, -14,-3, -18,3],
    [-18,3, -20,-1, -22,1],
  ];
  ctx.lineWidth=4;ctx.lineCap="round";ctx.lineJoin="round";
  ctx.strokeStyle="#cc4400";ctx.shadowColor="#ff6600";ctx.shadowBlur=4;
  segs.forEach(([x1,y1,cx1,cy1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx1,cy1,x2,y2);ctx.stroke();
  });
  // worm head
  ctx.beginPath();ctx.arc(-22,1,3.5,0,Math.PI*2);
  ctx.fillStyle="#dd3300";ctx.fill();
  // eyes
  ctx.beginPath();ctx.arc(-23.5,0,1,0,Math.PI*2);
  ctx.fillStyle="#111";ctx.fill();
  ctx.restore();
}

function drawHook(ctx,cx,hookY,fromTop){
  ctx.save();
  // ── Fishing line (dashed, from edge to hook eye) ──
  ctx.beginPath();ctx.setLineDash([6,5]);
  ctx.strokeStyle="rgba(210,240,255,0.55)";ctx.lineWidth=1.5;
  if(fromTop){ctx.moveTo(cx,0);ctx.lineTo(cx,hookY-38);}
  else{ctx.moveTo(cx,H);ctx.lineTo(cx,hookY+38);}
  ctx.stroke();ctx.setLineDash([]);

  ctx.save();
  if(!fromTop){
    // flip vertically for bottom hook
    ctx.translate(cx, hookY);
    ctx.scale(1,-1);
    ctx.translate(-cx,-hookY);
  }

  // Hook is oriented: shank goes DOWN from eye, bend curves LEFT (toward player)
  const ex=cx, ey=hookY-36; // eye position
  const shankBot=hookY+2;   // bottom of shank

  // ── Eye (small loop at top) ──
  ctx.beginPath();ctx.arc(ex, ey, 5, 0, Math.PI*2);
  ctx.strokeStyle="#c8e0ff";ctx.lineWidth=2;ctx.shadowColor="#aef0ff";ctx.shadowBlur=6;
  ctx.stroke();

  // ── Shank (straight down) ──
  ctx.beginPath();ctx.moveTo(ex, ey+5);ctx.lineTo(ex, shankBot);
  ctx.strokeStyle="#c8e0ff";ctx.lineWidth=4;ctx.lineCap="round";
  ctx.shadowColor="#aef0ff";ctx.shadowBlur=8;
  ctx.stroke();

  // ── Bend curves LEFT then tip points UP-LEFT (toward player) ──
  // The bend: arc from bottom of shank, curving left
  ctx.beginPath();
  ctx.moveTo(ex, shankBot);
  // curve left and up — hook opens to the LEFT (toward player coming from left)
  ctx.bezierCurveTo(
    ex,    shankBot+16,   // control 1: straight down
    ex-22, shankBot+16,   // control 2: left
    ex-22, shankBot+2     // end: left side, coming back up
  );
  ctx.strokeStyle="#c8e0ff";ctx.lineWidth=4;ctx.lineCap="round";
  ctx.stroke();

  // ── Point (tip going UP, slightly right — the barb direction) ──
  ctx.beginPath();
  ctx.moveTo(ex-22, shankBot+2);
  ctx.lineTo(ex-14, shankBot-8);
  ctx.strokeStyle="#e8f4ff";ctx.lineWidth=3;ctx.lineCap="round";
  ctx.stroke();

  // ── Barb (small spur pointing right from the point) ──
  ctx.beginPath();
  ctx.moveTo(ex-18, shankBot-3);
  ctx.lineTo(ex-10, shankBot-1);
  ctx.strokeStyle="#e8f4ff";ctx.lineWidth=2;
  ctx.stroke();

  ctx.restore();

  // ── Worm at the hook tip ──
  // tip is at (cx-22, hookY+shankBot+2) for top hook
  if(fromTop){
    drawWorm(ctx, cx-22, hookY+4, false);
  } else {
    drawWorm(ctx, cx-22, hookY-4, true);
  }

  ctx.restore();
}

function drawPU(ctx,pu,t){
  const bob=Math.sin(t*0.05+pu.id*10)*5;
  const col=PU_COLORS[pu.type];
  ctx.save();ctx.translate(pu.x,pu.y+bob);
  ctx.shadowColor=col;ctx.shadowBlur=18;
  ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);
  ctx.fillStyle=col+"33";ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
  ctx.shadowBlur=0;ctx.font="18px serif";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(PU_ICONS[pu.type],0,1);ctx.restore();
}

function hitsHook(fx,fy,p,tiny){
  const cx=p.x+PIPE_W/2, FR=tiny?7:13;
  // Shank: vertical line at cx, from top to hookY (top hook) or from bottom to hookY (bottom)
  // Top hook shank: x=cx, y from 0 to p.top+2
  if(fy-FR < p.top && fx+FR > cx-4 && fx-FR < cx+4) return true;
  // Bottom hook shank: x=cx, y from p.top+GAP-2 to H
  if(fy+FR > p.top+GAP && fx+FR > cx-4 && fx-FR < cx+4) return true;
  // Top hook bend+point — occupies left side: x from cx-26 to cx, y near p.top
  if(fy > p.top-4 && fy < p.top+20 && fx+FR > cx-28 && fx-FR < cx+2) return true;
  // Bottom hook bend+point — mirror
  if(fy < p.top+GAP+4 && fy > p.top+GAP-20 && fx+FR > cx-28 && fx-FR < cx+2) return true;
  return false;
}

// ── Game init ──────────────────────────────────────────────────────────────
function initGame(){
  _lastTop=H/2-GAP/2;
  gs={
    fish:{x:100,y:H/2,vy:0,angle:0},
    pipes:[makePipe(W+200),makePipe(W+500)],
    pus:[],
    freeWorms:[],
    nextWorm:ri(300,500),
    bgFish:Array.from({length:10},()=>makeBgFish(true)),
    bubbles:Array.from({length:20},()=>({x:ri(0,W),y:ri(0,H),r:ri(3,8),vy:ri(1,3)*-0.4,a:Math.random()*0.4+0.1})),
    particles:[],
    score:0,combo:0,comboTimer:0,
    activePU:null,puTimer:0,
    bgPalette:0,bgT:0,
    t:0,alive:true,usedBoost:false,
    pipeInterval:150,  // frequent pipes
    nextPipe:150,
  };
  lastTs=0;
}

// ── Delta-time game loop ───────────────────────────────────────────────────
function gameLoop(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min(ts-lastTs,50)/16.67;
  lastTs=ts;
  const s=gs;
  if(!s||!s.alive)return;
  const canvas=document.getElementById("canvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  s.t+=dt;

  s.bgT+=0.003*dt;
  if(s.bgT>=1){s.bgT=0;s.bgPalette=(s.bgPalette+1)%BG.length;}

  const slowMul=s.activePU==="boost"?2.0:1;
  const spd=PIPE_SPEED*slowMul*(1+s.score*0.002)*dt;

  s.fish.vy+=GRAVITY*dt;
  if(s.fish.vy>6)s.fish.vy=6;
  s.fish.y+=s.fish.vy*dt;
  s.fish.angle=Math.max(-0.5,Math.min(1.2,s.fish.vy*0.07));
  if(s.fish.y<0||s.fish.y>H){die();return;}

  s.nextPipe-=dt;
  if(s.nextPipe<=0){
    const np=makePipe(W+20);s.pipes.push(np);
    s.nextPipe=s.pipeInterval;
    if(Math.random()<0.4)s.pus.push(makePU(W+20,np.top));
  }
  s.pipes=s.pipes.filter(p=>p.x+PIPE_W>-10);
  s.pus=s.pus.filter(p=>p.x>-20&&!p.collected);

  for(const p of s.pipes)p.x-=spd;
  for(const pu of s.pus)pu.x-=spd;
  for(const w of s.freeWorms)w.x-=spd*0.7;
  s.freeWorms=s.freeWorms.filter(w=>w.x>-40&&!w.collected);

  // spawn free worms occasionally
  s.nextWorm-=dt;
  if(s.nextWorm<=0){
    s.freeWorms.push(makeFreeWorm(W+30));
    s.nextWorm=ri(250,450);
  }

  // collect free worms
  for(const w of s.freeWorms){
    if(!w.collected&&Math.hypot(s.fish.x-w.x,s.fish.y-w.y)<28){
      w.collected=true;
      s.score+=10;
      updateHUD();
      for(let i=0;i<8;i++)s.particles.push({x:w.x,y:w.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30,col:"#00ffaa"});
    }
  }

  // bg fish swim RIGHT→LEFT (x decreases)
  for(const f of s.bgFish){
    f.x-=f.speed*dt;
    if(f.x<-160)Object.assign(f,makeBgFish(false));
  }

  // collect PUs first
  for(const pu of s.pus){
    if(!pu.collected&&Math.hypot(s.fish.x-pu.x,s.fish.y-pu.y)<30){
      pu.collected=true;s.activePU=pu.type;s.puTimer=pu.type==="slow"?300:600;
      if(pu.type==="boost")s.usedBoost=true;
      if(pu.type==="star"){s.score+=5;updateHUD();}
      showPULabel(pu.type);updatePUHud();
    }
  }
  if(s.puTimer>0){s.puTimer-=dt;updatePUHud();if(s.puTimer<=0){s.activePU=null;s.puTimer=0;updatePUHud();}}

  // score + collision
  for(const p of s.pipes){
    const fx=s.fish.x,fy=s.fish.y;
    if(!p.scored&&p.x+PIPE_W<fx){
      p.scored=true;s.score++;s.combo++;s.comboTimer=120;
      for(let i=0;i<8;i++)s.particles.push({x:fx,y:fy,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:40,col:["#ffd700","#ff6bb5","#00f5ff"][ri(0,2)]});
      updateHUD();
    }
    if(s.activePU==="boost"||s.activePU==="star")continue;
    if(hitsHook(s.fish.x,s.fish.y,p,s.activePU==="tiny")){
      if(!p.shieldUsed && s.activePU==="shield"){
        // Shield absorbs this hit — mark pipe so same pipe can't trigger twice
        p.shieldUsed=true;
        s.activePU=null;s.puTimer=0;updatePUHud();
        for(let i=0;i<16;i++)s.particles.push({
          x:s.fish.x,y:s.fish.y,
          vx:(Math.random()-0.5)*9,vy:(Math.random()-0.5)*9,
          life:35,col:"#00f5ff"
        });
      } else if(!p.shieldUsed){
        die();return;
      }
    }
  }

  s.comboTimer-=dt;
  if(s.comboTimer<=0&&s.combo>0){s.combo=0;updateHUD();}
  s.bubbles.forEach(b=>{b.y+=b.vy*dt;if(b.y<-10){b.y=H+10;b.x=ri(0,W);}});
  s.particles=s.particles.filter(p=>p.life>0);
  s.particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.15*dt;p.life-=dt;});

  // ── Draw ──────────────────────────────────────────────────────────────
  const pal=BG[s.bgPalette],np2=BG[(s.bgPalette+1)%BG.length];
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,lerpCol(pal[0],np2[0],s.bgT));
  bg.addColorStop(0.5,lerpCol(pal[1],np2[1],s.bgT));
  bg.addColorStop(1,lerpCol(pal[2],np2[2],s.bgT));
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.globalAlpha=0.04+Math.sin(s.t*0.02)*0.02;
  for(let i=0;i<5;i++){
    const rx=(i*120+s.t*0.3)%W;
    ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx+40,H);ctx.lineTo(rx+60,H);ctx.lineTo(rx+20,0);ctx.closePath();
    ctx.fillStyle="#aef0ff";ctx.fill();
  }
  ctx.restore();

  s.bubbles.forEach(b=>{ctx.save();ctx.globalAlpha=b.a;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle="#aef0ff";ctx.lineWidth=1;ctx.stroke();ctx.restore();});
  s.freeWorms.filter(w=>!w.collected).forEach(w=>drawFreeWorm(ctx,w,s.t));
  for(const f of s.bgFish)drawBgFish(ctx,f,s.t);
  ctx.save();ctx.fillStyle="#0a4a3a";ctx.fillRect(0,0,W,8);ctx.fillRect(0,H-8,W,8);ctx.restore();
  s.pipes.forEach(p=>{drawHook(ctx,p.x+PIPE_W/2,p.top,true);drawHook(ctx,p.x+PIPE_W/2,p.top+GAP,false);});
  s.pus.filter(p=>!p.collected).forEach(p=>drawPU(ctx,p,s.t));
  s.particles.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,p.life/40);ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.restore();});
  drawFish(ctx,s.fish.x,s.fish.y,s.fish.angle,s.activePU==="shield",s.activePU==="star",s.activePU==="tiny");

  raf=requestAnimationFrame(gameLoop);
}

async function die(){
  if(gs)gs.alive=false;
  cancelAnimationFrame(raf);
  const finalScore=gs.score;
  screen="dead";render();
  // submit in background
  const board=await submitScore(nick,finalScore,gs.usedBoost);
  // refresh dead screen rank
  const rank=board.findIndex(e=>e.nick===nick)+1;
  const rb=document.getElementById("rank-badge");
  if(rb&&rank>0)rb.innerHTML=`Twoja pozycja: <b>#${rank}</b> / Top 100`;
}

function updateHUD(){
  const el=document.getElementById("score-hud");if(el)el.textContent=gs.score;
  const cel=document.getElementById("combo-hud");
  if(cel){if(gs.combo>=3){cel.textContent=`x${gs.combo} COMBO${gs.combo>=10?"🔥":""}`;cel.style.display="block";}else cel.style.display="none";}
}
let puLabelTimer=null;
function showPULabel(type){
  const el=document.getElementById("pu-flash");
  if(!el)return;
  el.textContent=PU_LABELS[type];el.style.display="block";
  clearTimeout(puLabelTimer);
  puLabelTimer=setTimeout(()=>{if(el)el.style.display="none";},1800);
}
function updatePUHud(){
  const s=gs,ind=document.getElementById("pu-ind");
  if(!ind)return;
  if(s&&s.activePU){
    ind.style.display="block";
    ind.style.borderColor=PU_COLORS[s.activePU];
    ind.style.background=PU_COLORS[s.activePU]+"33";
    ind.querySelector(".pu-label").textContent=PU_ICONS[s.activePU]+" "+s.activePU.toUpperCase();
    const puMax=600;const pct=Math.max(0,(s.puTimer/puMax)*100);
    const bar=ind.querySelector(".pu-bar");
    bar.style.width=pct+"%";bar.style.background=PU_COLORS[s.activePU];
  }else{ind.style.display="none";}
}

// ── Screens ────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(screen==="nick"){
    app.innerHTML=`<div class="card">
      <div class="logo">🐠 Ocean Rush</div>
      <p class="sub">Głębiny czekają na mistrza</p>
      <input id="nick-input" placeholder="Twój nick..." maxlength="16" autocomplete="off"/>
      <button class="btn" id="play-btn">Zanurkuj! 🌊</button>
      <button class="btn btn-purple" id="board-btn">🏆 Ranking Top 100</button>
      <button class="btn btn-orange" id="powers-btn">⚡ Power-upy — co robią?</button>
    </div>`;
    const inp=document.getElementById("nick-input");
    inp.focus();inp.addEventListener("keydown",e=>{if(e.key==="Enter")startGame();});
    document.getElementById("play-btn").onclick=startGame;
    document.getElementById("board-btn").onclick=showBoard;
    document.getElementById("powers-btn").onclick=()=>{screen="powers";render();};
    return;
  }
  if(screen==="powers"){
    app.innerHTML=`<div class="panel">
      <div class="panel-header"><div class="logo2">⚡ Power-upy</div><div class="sub">Zbierz kulkę w szczelinie!</div></div>
      <div class="plist">${[
        {icon:"🚀",col:"#ff6b35",name:"Speed Boost",desc:"Lecisz przez wszystko! Niezniszczalny przez 10 sek."},
        {icon:"🛡️",col:"#00f5ff",name:"Bubble Shield",desc:"Bańka ochronna — jeden haczyk nie zabija. Drugie już boli!"},
        {icon:"⭐",col:"#ffd700",name:"Star Rush",desc:"Złoty tryb + natychmiastowe +5 pkt. Lśnisz i zgarniasz!"},
        {icon:"🐡",col:"#ff44cc",name:"Tiny Fish",desc:"Zmniejszasz się o połowę! Mniejszy hitbox — łatwiej przecisnąć się przez haczyki."},
      ].map(p=>`<div class="pcard"><div class="picon">${p.icon}</div><div class="pdot" style="background:${p.col};box-shadow:0 0 8px ${p.col}"></div><div><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div><div class="pdur">⏱ 10 sekund</div></div></div>`).join("")}</div>
      <div style="padding:0 16px 16px"><button class="btn" id="back-btn">← Powrót</button></div>
    </div>`;
    document.getElementById("back-btn").onclick=()=>{screen="nick";render();};return;
  }
  if(screen==="board"){
    app.innerHTML=`<div class="panel">
      <div class="panel-header"><div class="logo2">🏆 TOP 100</div><div class="sub">Ocean Rush — Globalny Ranking</div></div>
      <div class="blist"><div class="loading">Ładowanie wyników... 🌊</div></div>
      <div style="padding:0 16px 16px"><button class="btn" id="back-btn">← Powrót</button></div>
    </div>`;
    document.getElementById("back-btn").onclick=()=>{screen="nick";render();};
    loadBoard().then(board=>{
      const bl=document.querySelector(".blist");
      if(!bl)return;
      bl.innerHTML=board.length===0?'<div class="empty">Brak wyników. Bądź pierwszy!</div>':
        board.map((e,i)=>`<div class="brow ${e.nick===nick?"brow-me":""} ${i<3?"brow-top":""}">
          <span class="rnum">${i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1)}</span>
          <span class="rnick">${e.nick}${e.boost?" 🚀":""}</span>
          <span class="rscore">${e.score}</span>
          <span class="rdate">${e.date}</span>
        </div>`).join("");
    });
    return;
  }
  if(screen==="dead"){
    app.innerHTML=`<div class="card">
      <div style="font-size:52px">💀</div>
      <div class="logo">Koniec!</div>
      <div style="font-size:22px;color:#cde">Wynik: <b style="color:#ffd700">${gs?gs.score:0}</b></div>
      <div id="rank-badge" class="rank-badge" style="opacity:0.5">Zapisuję wynik... ⏳</div>
      <button class="btn" id="retry-btn">🔄 Jeszcze raz!</button>
      <button class="btn btn-purple" id="board-btn2">🏆 Zobacz Ranking</button>
      <button class="btn btn-ghost" id="nick-btn">Zmień nick</button>
    </div>`;
    document.getElementById("retry-btn").onclick=startGame;
    document.getElementById("board-btn2").onclick=showBoard;
    document.getElementById("nick-btn").onclick=()=>{screen="nick";render();};
    return;
  }
  if(screen==="ready"||screen==="playing"){
    const cw=Math.min(W,window.innerWidth-24);
    app.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center">
      <div class="game-wrap" style="width:${cw}px;height:${Math.round(cw*(H/W))}px" id="game-wrap">
        <canvas id="canvas" width="${W}" height="${H}" style="width:${cw}px;height:${Math.round(cw*(H/W))}px"></canvas>
        <div class="hud"><div class="score-hud" id="score-hud">0</div><div class="combo-hud" id="combo-hud" style="display:none"></div></div>
        <div class="pu-ind" id="pu-ind" style="display:none"><div class="pu-label"></div><div class="pu-bar-bg"><div class="pu-bar" style="width:100%"></div></div></div>
        <div class="pu-flash" id="pu-flash" style="display:none"></div>
        ${screen==="ready"?`<div class="overlay" id="ready-overlay"><div class="overlay-card"><div style="font-size:40px">🐠</div><div style="font-size:22px;font-weight:800;color:#fff">Gotowy, ${nick}?</div><div style="font-size:13px;color:#aef0ff;margin-top:4px">Tap aby płynąć!</div></div></div>`:""}
      </div>
      <div class="bottom-bar" style="width:${cw}px"><span style="color:#aef0ff;font-size:13px">👤 ${nick}</span><button class="mini-btn" id="rank-btn">🏆 Ranking</button></div>
    </div>`;
    document.getElementById("game-wrap").addEventListener("pointerdown",tap);
    document.getElementById("rank-btn").onclick=e=>{e.stopPropagation();cancelAnimationFrame(raf);showBoard();};
    if(screen==="playing"){lastTs=0;raf=requestAnimationFrame(gameLoop);}
  }
}

function showBoard(){screen="board";render();}

function startGame(){
  const inp=document.getElementById("nick-input");
  if(inp)nick=inp.value.trim()||nick;
  if(!nick)return;
  cancelAnimationFrame(raf);
  initGame();screen="ready";render();
}

function tap(e){
  if(e)e.stopPropagation();
  if(screen==="ready"){
    document.getElementById("ready-overlay")?.remove();
    screen="playing";lastTs=0;raf=requestAnimationFrame(gameLoop);return;
  }
  if(screen==="playing"&&gs&&gs.alive){
    gs.fish.vy=JUMP;
    for(let i=0;i<6;i++)gs.bubbles.push({x:gs.fish.x-10+Math.random()*20,y:gs.fish.y+Math.random()*10,r:ri(2,5),vy:-Math.random()*2-0.5,a:0.6});
  }
}
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();tap();}});
// Prevent Safari scroll/zoom — only on game canvas area
document.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});
render();
</script>
